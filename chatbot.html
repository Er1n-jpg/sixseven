<!-- chatbot page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauder AI - chatbot</title>
    <link rel="stylesheet" href="chatbotstyles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gugi&family=Handjet:wght,ELSH@100..900,2&display=swap');
    </style>
    <link rel = "icon" type = "lauder.png" href = "lauder.png">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <h1>Lauder AI</h1>
        </div>
        <div class="buttons">
            <btn id="script">Script</btn>
            <btn id="record">Record</btn>
            <btn id="upload">Upload</btn>
        </div>
    </div>
    <div class="content">
        <div class="lauder">
            <img src="" alt="Lauder Img">
        </div>
        <div class="chatbox">
            <div class="chat-content">
                <p>hehe</p>
                <p>hehe</p>
                <p>1</p>
                <p>2</p>
                <p>3</p>
                <p>4</p>
                <p>5</p>
                <p>6</p>
                <p>7</p>
                <p>8</p>
                <p>9</p>
                <p>10</p>
                <p>11</p>
                <p>12</p>
                <p>13</p>
                <p>14</p>
                <p>15</p>
                <p>16</p>
                <p>17</p>
                <p>18</p>
            </div>
            <div class="chat-input">
                <input id="text-input" type="text" placeholder="Talk to me...">
                <img src="" alt="send">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
