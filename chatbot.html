<!-- chatbot page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauder AI - chatbot</title>
    <link rel="stylesheet" href="chatbotstyles.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <h1>Lauder AI</h1>
        </div>
        <div class="buttons">
            <btn id="script">Script</btn>
            <btn id="record">Record</btn>
            <btn id="upload">Upload</btn>
        </div>
    </div>
    <div class="content">
        <div class="lauder">
            <img src="" alt="Lauder Img">
        </div>
        <div class="chatbox">
            <div class="chat-content">
                <p>hehe</p>
            </div>
            <div class="chat-input">
                <input id="text-input" type="text" placeholder="Talk to me...">
                <img src="" alt="send">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
